<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2563eb">
  <title>Boardly | Offline</title>
  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.9);
      --border: rgba(148, 163, 184, 0.25);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.28), transparent 45%),
        radial-gradient(circle at 80% 10%, rgba(14, 165, 233, 0.22), transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(99, 102, 241, 0.2), transparent 45%),
        var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .card {
      width: min(520px, 100%);
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      backdrop-filter: blur(10px);
    }
    .badge {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: #fff;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.2;
    }
    p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    a, button {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .primary {
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      border-color: transparent;
      color: #fff;
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="badge" aria-hidden="true">B</div>
    <h1>You're offline</h1>
    <p>Boardly could not load fresh data. Check your connection and try again. Cached pages and static assets will continue to work when available.</p>
    <div class="actions">
      <button class="primary" type="button" onclick="location.reload()">Try again</button>
      <a href="/">Go to home</a>
    </div>
  </main>
</body>
</html>
