name: CI

"on":
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    name: Fast Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    env:
      # Fast CI matrix intentionally avoids DB setup; provide placeholders for modules that read env.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/boardly_ci_placeholder"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/boardly_ci_placeholder"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: test-nextauth-secret-32chars-min-required-len
      SOCKET_SERVER_INTERNAL_SECRET: test-socket-secret-32chars-min-required-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint and typecheck (ci:quick)
        run: npm run ci:quick

      - name: Run smoke tests
        run: >-
          npm test -- --ci --runTestsByPath
          __tests__/lib/socket-url.test.ts
          __tests__/lib/guest-helpers.test.ts
          __tests__/lib/game-registry.test.ts
          __tests__/lib/lobby-player-requirements.test.ts

  bundle-budget:
    name: Bundle Budget (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Build + budget checks do not require a real DB, but some routes instantiate Prisma during build.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/boardly_ci_placeholder"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/boardly_ci_placeholder"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: test-nextauth-secret-32chars-min-required-len
      SOCKET_SERVER_INTERNAL_SECRET: test-socket-secret-32chars-min-required-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (production)
        run: npm run build

      - name: Enforce bundle budget
        run: npm run check:bundle-budget
